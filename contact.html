    Home

<br><br>
<h1>Contact Us!</h1>
<h2></h2>

<h3>Email:</h3>
  <p>ABCtoys@gmail.com</p>
<h3>Phone:</h3>
  <p>(111)111-1111</p>
<h3>Address:</h3>
  <p>232 Fun Lane</p>
<h3>Social Media:</h3>
  <a href="https://www.facebook.com/" target="_blank" rel="noopener noreferrer">ABC Toys Facebook</a>

<br><br>

<h3>Or leave us a message through this form:</h3>
<form class="ui form">
  <div class="field">
    <label>Full Name</label>
    <input type="text" name="fullname" placeholder="Full Name" maxlength="50">
  </div>
  <div class="field">
    <label>Email Address</label>
    <input type="email" name="email" placeholder="Email" required>
  </div>
  <div class="field">
    <label>Comments</label>
	<textarea rows="3" placeholder="Type here..."></textarea>
  </div>
  <div class="field">
    <div class="ui checkbox">
      <input type="checkbox" class="hidden">
      <label>I agree to the Terms and Conditions</label>
    </div>
  </div>
  <button class="ui button" type="submit">Submit</button>
</form>
